<form class="stack compact" method="post" action="/projects/{{ project.id }}/documents">
  <input name="title" placeholder="Название документа" required>
  <select name="type">
    <option value="техническое задание">техническое задание</option>
    <option value="устав проекта">устав проекта</option>
    <option value="протокол встречи">протокол встречи</option>
    <option value="схема">схема</option>
    <option value="прочий документ">прочий документ</option>
  </select>
  <input name="file_path" placeholder="Локальный путь к файлу">
  <textarea name="summary" placeholder="Краткое описание"></textarea>
  <button type="submit">Добавить документ</button>
</form>

<div class="cards">
  {% for document in documents %}
    <article class="doc-card">
      <div>
        <strong>{{ document.title }}</strong>
        <small>{{ document.type }} · {{ document.status }}</small>
      </div>
      {% if document.file_path %}<p>{{ document.file_path }}</p>{% endif %}
    </article>
  {% else %}
    <p class="muted">Документов пока нет.</p>
  {% endfor %}
</div>
